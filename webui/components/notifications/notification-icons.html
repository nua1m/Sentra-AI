<html>

<head>
    <script type="module">
        import { store } from "/components/sidebar/bottom/preferences/preferences-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.preferences">
            <!-- Theme Toggle Button -->
            <div class="notification-toggle" @click="$store.preferences.darkMode = !$store.preferences.darkMode"
                :title="$store.preferences.darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
                <div class="notification-icon">
                    <span class="material-symbols-outlined"
                        x-text="$store.preferences.darkMode ? 'light_mode' : 'dark_mode'"></span>
                </div>
            </div>
        </template>
    </div>
</body>

</html>
