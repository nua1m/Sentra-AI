<html>

<head>
    <script type="module">
        import { store } from "/components/sidebar/bottom/preferences/preferences-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.preferences">
            <div class="top-right-controls">
                <button type="button" class="theme-toggle" :class="{ 'is-light': !$store.preferences.darkMode }"
                    @click="$store.preferences.darkMode = !$store.preferences.darkMode"
                    :title="$store.preferences.darkMode ? 'Switch to light mode' : 'Switch to dark mode'"
                    :aria-label="$store.preferences.darkMode ? 'Dark mode enabled. Switch to light mode' : 'Light mode enabled. Switch to dark mode'">
                    <span class="theme-toggle-track" aria-hidden="true">
                        <span class="theme-icon moon material-symbols-outlined">dark_mode</span>
                        <span class="theme-icon sun material-symbols-outlined">light_mode</span>
                    </span>
                    <span class="theme-toggle-thumb" aria-hidden="true">
                        <span class="theme-thumb-icon material-symbols-outlined"
                            x-text="$store.preferences.darkMode ? 'dark_mode' : 'light_mode'">dark_mode</span>
                    </span>
                </button>

                <button type="button" class="settings-toggle"
                    @click="openModal('settings/minimal/topbar-model-settings.html')" title="Settings"
                    aria-label="Open settings">
                    <span class="material-symbols-outlined">settings</span>
                </button>
            </div>
        </template>
    </div>
</body>

<style>
    .top-right-controls {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 100%;
        min-height: 28px;
    }

    .theme-toggle {
        width: 48px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid var(--color-border, #333);
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.9);
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        position: relative;
        padding: 2px 5px;
        overflow: hidden;
        line-height: 1;
        margin: 0;
        box-sizing: border-box;
        align-self: center;
        appearance: none;
        -webkit-appearance: none;
    }

    .theme-toggle:hover {
        border-color: rgba(255, 255, 255, 0.35);
        color: #fff;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
    }

    .light-mode .theme-toggle {
        background: rgba(255, 255, 255, 0.92);
        border-color: rgba(15, 23, 42, 0.22);
        color: rgba(15, 23, 42, 0.65);
    }

    .theme-toggle-track {
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 1;
    }

    .theme-icon {
        font-size: 12px;
        line-height: 1;
        transition: color 0.2s ease, opacity 0.2s ease;
        opacity: 0.7;
    }

    .theme-icon.moon {
        color: rgba(255, 255, 255, 0.68);
    }

    .theme-icon.sun {
        color: rgba(255, 255, 255, 0.42);
    }

    .theme-toggle-thumb {
        position: absolute;
        left: 2px;
        top: 50%;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        transform: translate(0, -50%);
        transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s ease;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .theme-thumb-icon {
        font-size: 12px;
        line-height: 1;
        color: rgba(255, 255, 255, 0.95);
    }

    .theme-toggle.is-light .theme-toggle-thumb {
        transform: translate(22px, -50%);
        background: #f8fafc;
        border-color: rgba(15, 23, 42, 0.18);
    }

    .theme-toggle.is-light .theme-icon.moon {
        color: rgba(15, 23, 42, 0.4);
    }

    .theme-toggle.is-light .theme-icon.sun {
        color: rgba(15, 23, 42, 0.85);
    }

    .theme-toggle.is-light .theme-thumb-icon {
        color: rgba(15, 23, 42, 0.86);
    }

    .settings-toggle {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid var(--color-border, #333);
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.7);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: border-color 0.2s ease, color 0.2s ease, transform 0.24s cubic-bezier(0.2, 0.8, 0.2, 1);
        line-height: 1;
    }

    .light-mode .settings-toggle {
        background: rgba(255, 255, 255, 0.92);
        border-color: rgba(15, 23, 42, 0.22);
        color: rgba(15, 23, 42, 0.65);
    }

    .settings-toggle:hover {
        border-color: rgba(255, 255, 255, 0.35);
        color: #fff;
        transform: rotate(90deg);
    }

    .settings-toggle:active {
        transform: scale(0.92) rotate(170deg);
    }

    .light-mode .settings-toggle:hover,
    .light-mode .theme-toggle:hover {
        border-color: rgba(15, 23, 42, 0.35);
        color: rgba(15, 23, 42, 0.9);
        box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.06) inset;
    }

    .settings-toggle .material-symbols-outlined {
        font-size: 16px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
</style>

</html>
