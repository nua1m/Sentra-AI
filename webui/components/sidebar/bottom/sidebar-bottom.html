<html>

<head>
  <script type="module">
    import { store } from "/components/sidebar/bottom/sidebar-bottom-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.sidebarBottom">
      <div class="sidebar-bottom-wrapper">
        <!-- Profile Info -->
        <div class="profile-info">
          <div class="profile-avatar" aria-hidden="true">A</div>
          <div class="profile-meta">
            <span class="profile-label">Username</span>
            <span class="profile-name">admin</span>
          </div>
        </div>
      </div>
    </template>
  </div>


  <style>
    /* Sidebar bottom wrapper */
    .sidebar-bottom-wrapper {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* Profile area */
    .profile-info {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      margin: 0;
      margin-top: 0.35rem;
      padding-top: 0.6rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .profile-avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #00c340 0%, #2a8f4e 100%);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      border: 2px solid #09090b;
      overflow: hidden;
      box-shadow: none;
    }

    .profile-meta {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .profile-label {
      display: none;
    }

    .profile-name {
      color: #94a3b8;
      font-size: 0.95rem;
      font-weight: 500;
    }

    @media (max-width: 1023px) {
      .profile-meta {
        display: none;
      }

      .profile-info {
        justify-content: center;
      }
    }
  </style>
</body>

</html>
