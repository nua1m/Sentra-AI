<html>

<head>
  <script type="module">
    import { store } from "/components/sidebar/chats/chats-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.chats">
      <div class="chats-list-container" x-data>
        <div class="sidebar-history-top">
          <button id="newChat" class="new-scan-btn" @click="$store.chats.newChat()" aria-label="New Scan"
            title="New Scan" data-bs-placement="top" data-bs-trigger="hover">
            <span class="material-symbols-outlined" aria-hidden="true">add</span>
          </button>
        </div>
        <h3 class="history-kicker">History</h3>



        <ul class="config-list chats-config-list no-scrollbar" x-show="$store.chats.contexts.length > 0">
          <template x-for="context in $store.chats.contexts" :key="context.id">
            <li>
              <div :class="{'chat-container': true, 'chat-selected': context.id === $store.chats.selected}"
                @click="$store.chats.selectChat(context.id)">
                <div class="chat-list-button">
                  <span :class="{'project-color-ball': true, 'heartbeat': context.running}"
                    :style="context.project?.color ? { backgroundColor: context.project.color } : { border: '1px solid var(--color-border)' }"></span>
                  <span class="chat-name" x-text="context.name ? context.name : 'Chat #' + context.no"></span>
                </div>
                <button class="btn-icon-action chat-list-action-btn" title="Close chat"
                  @click.stop="$confirmClick($event, () => $store.chats.killChat(context.id))">
                  <span class="material-symbols-outlined">close</span>
                </button>
              </div>
            </li>
          </template>
        </ul>
        <div class="empty-list-message" x-show="$store.chats.contexts.length === 0">
          <p><i>No chats to list.</i></p>
        </div>
      </div>
    </template>
  </div>

  <style>
    .sidebar-history-top {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 1.4rem;
    }

    .history-kicker {
      margin: 0;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #71717a;
      margin-bottom: 0.9rem;
    }

    .new-scan-btn {
      width: 3rem;
      height: 3rem;
      border-radius: 12px;
      background: #1a1a1e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: none;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .new-scan-btn .material-symbols-outlined {
      font-size: 1.6rem;
      font-weight: 300;
    }

    .new-scan-btn:hover {
      border-color: rgba(255, 255, 255, 0.26);
      transform: translateY(-1px);
      box-shadow: none;
    }

    .new-scan-btn:active {
      transform: translateY(0);
    }

    /* Chats list container and items */
    .chats-list-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      margin-top: 0;
    }

    .chats-config-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      scroll-behavior: smooth;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .chat-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 44px;
      border-radius: 10px;
      border-left: none;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .chat-list-button {
      display: flex;
      align-items: center;
      flex-grow: 1;
      padding: 0.7rem 0.8rem;
      overflow: hidden;
      gap: 0.5em;
    }

    .project-color-ball {
      width: 0.6em;
      height: 0.6em;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .chat-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.9rem;
      color: #a1a1aa;
    }

    .chat-list-action-btn {
      flex-shrink: 0;
      margin-right: 6px;
    }

    .chat-container:hover {
      background-color: rgba(255, 255, 255, 0.04);
    }

    .device-pointer .chat-container .chat-list-action-btn {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0s;
    }

    .device-pointer .chat-container:hover .chat-list-action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .device-touch .chats-list-container .chat-list-action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .empty-list-message {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100px;
      color: var(--color-secondary);
      text-align: center;
      opacity: 0.7;
      font-style: italic;
    }

    .light-mode .empty-list-message {
      color: var(--color-secondary-light);
    }

    /* Selected chat accent */
    .chat-selected .chat-name {
      color: #fff;
      font-weight: 500;
    }

    .chat-selected {
      background: #1a1a1e;
      border-left: none;
      box-shadow: none;
    }

    /* .chat-list-button.font-bold { position: relative; background-color: var(--color-border) 0.05; } */
    /* .chat-list-button.font-bold::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background-color: var(--color-border); border-top-left-radius: 3px; border-bottom-left-radius: 3px; } */
    /* .light-mode .chat-list-button.font-bold { background-color: var(--color-border) 0.05; } */
    /* .light-mode .chat-list-button.font-bold::before { background-color: var(--color-border); } */
  </style>
</body>

</html>
