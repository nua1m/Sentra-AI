<html>

<head>
  <script type="module">
    import { store } from "/components/sidebar/chats/chats-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.chats">
      <div class="chats-list-container" x-data>
        <div class="sidebar-history-top">
          <button id="newChat" class="new-scan-btn" @click="$store.chats.newChat()" aria-label="New Scan"
            title="New Scan" data-bs-placement="top" data-bs-trigger="hover">
            <span class="material-symbols-outlined" aria-hidden="true">add</span>
          </button>
        </div>
        <h3 class="history-kicker">History</h3>



        <ul class="config-list chats-config-list no-scrollbar" x-show="$store.chats.contexts.length > 0">
          <template x-for="(context, idx) in $store.chats.contexts" :key="context.id">
            <li class="chat-row-item" :style="`--item-index:${idx};`">
              <div :class="{'chat-container': true, 'chat-selected': context.id === $store.chats.selected}"
                @click="$store.chats.selectChat(context.id)">
                <div class="chat-list-button">
                  <span :class="{'project-color-ball': true, 'heartbeat': context.running}"
                    :style="context.id === $store.chats.selected ? { backgroundColor: '#ffffff' } : (context.project?.color ? { backgroundColor: context.project.color } : { border: '1px solid var(--color-border)' })"></span>
                  <span class="chat-name" x-text="context.name ? context.name : 'Chat #' + context.no"></span>
                </div>
                <button class="btn-icon-action chat-list-action-btn" title="Close chat"
                  @click.stop="$confirmClick($event, () => $store.chats.killChat(context.id))">
                  <span class="material-symbols-outlined">close</span>
                </button>
              </div>
            </li>
          </template>
        </ul>
        <div class="empty-list-message" x-show="$store.chats.contexts.length === 0">
          <p><i>No chats to list.</i></p>
        </div>
      </div>
    </template>
  </div>

  <style>
    .sidebar-history-top {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 1.4rem;
      padding: 2px;
      overflow: visible;
    }

    .history-kicker {
      margin: 0;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #71717a;
      margin-bottom: 0.9rem;
    }

    .light-mode .history-kicker {
      color: #64748b;
    }

    .new-scan-btn {
      width: 3rem;
      height: 3rem;
      border-radius: 12px;
      background: #1a1a1e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: none;
      transition: border-color 0.25s ease, transform 0.25s ease, background-color 0.25s ease;
      overflow: visible;
      position: relative;
      transform-origin: center;
    }

    .light-mode .new-scan-btn {
      background: #ffffff;
      border-color: rgba(15, 23, 42, 0.16);
      color: rgba(15, 23, 42, 0.86);
    }

    .new-scan-btn .material-symbols-outlined {
      font-size: 1.6rem;
      font-weight: 300;
      transition: transform 0.26s ease;
      position: relative;
      z-index: 1;
    }

    .chats-new-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      background: rgba(0, 255, 65, 0.1);
      color: var(--color-primary);
      border: 1px solid rgba(0, 255, 65, 0.2);
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-speed) ease;
    }

    .chats-new-btn:hover {
      background: rgba(0, 255, 65, 0.15);
      border-color: rgba(0, 255, 65, 0.4);
      transform: translateY(-1px);
    }

    .chats-new-btn svg {
      width: 18px;
      height: 18px;
      transition: transform var(--transition-speed) ease, fill var(--transition-speed) ease;
    }

    .new-scan-btn:hover {
      border-color: rgba(255, 255, 255, 0.26);
      background-color: #1a1a1e;
      transform: translateY(-1px) scale(1.08);
      box-shadow: none;
    }

    .light-mode .new-scan-btn:hover {
      border-color: rgba(15, 23, 42, 0.28);
      background-color: #f8fafc;
    }

    .new-scan-btn:hover .material-symbols-outlined {
      transform: rotate(90deg);
    }

    .new-scan-btn:active {
      transform: translateY(0) scale(0.97);
    }

    /* Chats list container and items */
    .chats-list-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      margin-top: 0;
    }

    .chats-config-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      scroll-behavior: smooth;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .chat-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 44px;
      border-radius: 10px;
      border-left: none;
      overflow: hidden;
      cursor: pointer;
      transition: all var(--transition-speed) ease;
    }

    .chat-row-item {
      animation: chatItemIn 0.28s ease both;
      animation-delay: calc(var(--item-index, 0) * 45ms);
    }

    @keyframes chatItemIn {
      from {
        opacity: 0;
        transform: translateX(-12px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .chat-list-button {
      display: flex;
      align-items: center;
      flex-grow: 1;
      padding: 0.54rem 0.72rem;
      overflow: hidden;
      gap: 0.42em;
    }

    .project-color-ball {
      width: 0.6em;
      height: 0.6em;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .chat-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.78rem;
      line-height: 1.15;
      color: #a1a1aa;
      letter-spacing: 0.01em;
    }

    .light-mode .chat-name {
      color: #475569;
    }

    .chat-list-action-btn {
      flex-shrink: 0;
      margin-right: 6px;
    }

    .chat-container:hover {
      background-color: rgba(255, 255, 255, 0.04);
      transform: translateX(3px);
    }

    .light-mode .chat-container:hover {
      background-color: rgba(15, 23, 42, 0.06);
    }

    .device-pointer .chat-container .chat-list-action-btn {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0s;
    }

    .device-pointer .chat-container:hover .chat-list-action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .device-touch .chats-list-container .chat-list-action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .empty-list-message {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100px;
      color: var(--color-secondary);
      text-align: center;
      opacity: 0.7;
      font-style: italic;
    }

    .light-mode .empty-list-message {
      color: var(--color-secondary-light);
    }

    /* Selected chat accent */
    .chat-selected .chat-name {
      color: #fff;
      font-weight: 500;
    }

    .light-mode .chat-selected .chat-name {
      color: #0f172a;
    }

    .chat-selected {
      background: #1a1a1e;
      border-left: none;
      box-shadow: none;
    }

    .light-mode .chat-selected {
      background: #e2e8f0;
    }

    .chat-selected .project-color-ball {
      background-color: #00c340 !important;
      border-color: rgba(0, 128, 0, 0.35) !important;
    }

    .light-mode .chat-selected .project-color-ball {
      background-color: #00c340 !important;
      border-color: rgba(0, 128, 0, 0.35) !important;
    }

    /* .chat-list-button.font-bold { position: relative; background-color: var(--color-border) 0.05; } */
    /* .chat-list-button.font-bold::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background-color: var(--color-border); border-top-left-radius: 3px; border-bottom-left-radius: 3px; } */
    /* .light-mode .chat-list-button.font-bold { background-color: var(--color-border) 0.05; } */
    /* .light-mode .chat-list-button.font-bold::before { background-color: var(--color-border); } */
  </style>
</body>

</html>
