<html>

<head>
  <script type="module">
    import { store } from "/components/sidebar/chats/chats-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.chats">
      <div class="chats-list-container" x-data>
        <div class="section-header-row" style="margin-bottom: 12px; padding: 0 8px;">
          <!-- Prominent New Scan Button -->
          <button id="newChat" class="primary-scan-btn" @click="$store.chats.newChat()" aria-label="New Scan">
            <span class="material-symbols-outlined" style="font-size: 1.2rem;">radar</span>
            <span>New Scan</span>
          </button>
        </div>
        <h3 class="section-header"
          style="padding: 0 8px; font-size: 0.85rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em;">
          Recent Scans</h3>



        <ul class="config-list chats-config-list no-scrollbar" x-show="$store.chats.contexts.length > 0">
          <template x-for="context in $store.chats.contexts" :key="context.id">
            <li>
              <div :class="{'chat-container': true, 'chat-selected': context.id === $store.chats.selected}"
                @click="$store.chats.selectChat(context.id)">
                <div class="chat-list-button">
                  <span :class="{'project-color-ball': true, 'heartbeat': context.running}"
                    :style="context.project?.color ? { backgroundColor: context.project.color } : { border: '1px solid var(--color-border)' }"></span>
                  <span class="chat-name" x-text="context.name ? context.name : 'Chat #' + context.no"></span>
                </div>
                <button class="btn-icon-action chat-list-action-btn" title="Close chat"
                  @click.stop="$confirmClick($event, () => $store.chats.killChat(context.id))">
                  <span class="material-symbols-outlined">close</span>
                </button>
              </div>
            </li>
          </template>
        </ul>
        <div class="empty-list-message" x-show="$store.chats.contexts.length === 0">
          <p><i>No chats to list.</i></p>
        </div>
      </div>
    </template>
  </div>

  <style>
    .chats-list-container .section-header-row {
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      flex-shrink: 0;
      z-index: 10;
      background: var(--color-panel);
      border-bottom: 1px solid color-mix(in srgb, var(--color-border) 65%, transparent);
      padding-bottom: 10px !important;
    }

    .chats-list-container .section-header {
      margin: 0;
    }

    .primary-scan-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: linear-gradient(180deg, color-mix(in srgb, var(--color-primary) 88%, #fff 12%), var(--color-primary));
      color: #07110a;
      border: 1px solid color-mix(in srgb, var(--color-primary) 45%, #000 55%);
      border-radius: 11px;
      padding: 11px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 8px 20px color-mix(in srgb, var(--color-primary) 24%, transparent);
      transition: all 0.2s ease;
    }

    .light-mode .primary-scan-btn {
      color: #fff;
    }

    .primary-scan-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 10px 22px color-mix(in srgb, var(--color-primary) 36%, transparent);
    }

    .primary-scan-btn:active {
      transform: translateY(0);
    }

    /* Chats list container and items */
    .chats-list-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      margin-top: var(--spacing-sm);
    }

    .chats-config-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      scroll-behavior: smooth;
      max-height: 100%;
      padding-right: 4px;
    }

    .chat-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      margin-bottom: 4px;
    }

    .chat-list-button {
      display: flex;
      align-items: center;
      flex-grow: 1;
      padding: 9px 10px;
      overflow: hidden;
      gap: 0.5em;
    }

    .project-color-ball {
      width: 0.6em;
      height: 0.6em;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .chat-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: var(--font-size-small);
      opacity: 0.92;
    }

    .chat-list-action-btn {
      flex-shrink: 0;
      margin-right: 6px;
    }

    .chat-container:hover {
      background-color: color-mix(in srgb, var(--color-background-hover) 75%, transparent);
      border-color: color-mix(in srgb, var(--color-border) 80%, transparent);
    }

    .device-pointer .chat-container .chat-list-action-btn {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0s;
    }

    .device-pointer .chat-container:hover .chat-list-action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .device-touch .chats-list-container .chat-list-action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .empty-list-message {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100px;
      color: var(--color-secondary);
      text-align: center;
      opacity: 0.7;
      font-style: italic;
    }

    .light-mode .empty-list-message {
      color: var(--color-secondary-light);
    }

    /* Selected chat accent */
    .chat-selected .chat-name {
      font-size: var(--font-size-normal);
      font-weight: 700;
      opacity: 1;
    }

    .chat-selected {
      border-color: color-mix(in srgb, var(--color-primary) 40%, var(--color-border));
      background: color-mix(in srgb, var(--color-primary) 8%, transparent);
    }

    /* .chat-list-button.font-bold { position: relative; background-color: var(--color-border) 0.05; } */
    /* .chat-list-button.font-bold::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background-color: var(--color-border); border-top-left-radius: 3px; border-bottom-left-radius: 3px; } */
    /* .light-mode .chat-list-button.font-bold { background-color: var(--color-border) 0.05; } */
    /* .light-mode .chat-list-button.font-bold::before { background-color: var(--color-border); } */
  </style>
</body>

</html>
