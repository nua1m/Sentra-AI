<html>

<head>
    <script type="module">
        import { store as attachmentsStore } from "/components/chat/attachments/attachmentsStore.js";
    </script>
</head>

<body>
    <div class="input-row">
        <div id="chat-input-container">
            <label for="file-input" class="attachment-icon" title="Add attachments to the message"
                data-bs-placement="top" data-bs-trigger="hover" aria-label="Attach files">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z" />
                </svg>
            </label>
            <input type="file" id="file-input" accept="*" multiple style="display: none"
                @change="$store.chatAttachments.handleFileUpload($event)">

            <textarea id="chat-input" :placeholder="$store.chatInput.inputPlaceholder" rows="1"
                @keydown.enter="if (!$event.shiftKey && !$event.isComposing && $event.keyCode !== 229) { $event.preventDefault(); $store.chatInput.sendMessage(); }"
                @input="$store.chatInput.adjustTextareaHeight()" x-model="$store.chatInput.message"></textarea>
            <button class="chat-button" id="send-button" :aria-label="$store.chatInput.sendButtonTitle"
                @click="$store.chatInput.sendMessage()" :class="$store.chatInput.sendButtonClass"
                :title="$store.chatInput.sendButtonTitle">
                <span class="material-symbols-outlined" x-text="$store.chatInput.sendButtonIcon"></span>
            </button>
        </div>
    </div>

    <style>
        /* Layout rows */
        .input-row {
            display: flex;
            align-items: center;
            width: 100%;
            white-space: nowrap;
            padding: 0;
        }

        /* Text input */
        #chat-input-container {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            background: rgba(26, 26, 30, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 0 0.38rem;
        }

        .light-mode #chat-input-container {
            background: rgba(255, 255, 255, 0.92);
            border-color: #e5e7eb;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
        }

        .attachment-icon {
            position: absolute;
            left: 0.72rem;
            top: 50%;
            transform: translate3d(0, -50%, 0);
            cursor: pointer;
            color: #d4d4d8;
            opacity: 0.9;
            transition: opacity 0.2s ease, transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 1.75rem;
            height: 1.75rem;
            line-height: 0;
            z-index: 2;
        }

        .attachment-icon:hover {
            opacity: 1;
            transform: translate3d(0, calc(-50% - 1px), 0);
        }

        .attachment-icon:active {
            opacity: 0.5;
        }

        #chat-input {
            background-color: transparent;
            border: 0;
            border-radius: 999px;
            color: var(--color-text);
            flex-grow: 1;
            font-family: "Roboto Mono", monospace;
            font-optical-sizing: auto;
            -webkit-font-optical-sizing: auto;
            font-size: 0.95rem;
            max-height: 12rem;
            min-height: 3.95rem;
            width: 100%;
            padding: 1.22rem 3.8rem 1.22rem 2.9rem;
            overflow-y: auto;
            scroll-behavior: smooth;
            resize: none;
            background-clip: border-box;
            outline: none;
            transition: all 0.3s ease;
            -webkit-transition: all 0.3s ease;
        }

        .light-mode #chat-input {
            color: #1f2937;
        }

        #chat-input::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        #chat-input::-webkit-scrollbar-track {
            background: transparent;
            margin: 4px 0;
            border-radius: 6px;
        }

        #chat-input::-webkit-scrollbar-thumb {
            background-color: rgba(155, 155, 155, 0.5);
            border-radius: 6px;
            -webkit-transition: background-color 0.2s ease;
            transition: background-color 0.2s ease;
        }

        #chat-input::-webkit-scrollbar-thumb:hover {
            background-color: rgba(155, 155, 155, 0.7);
        }

        #chat-input:focus {
            background-color: transparent;
        }

        #chat-input::placeholder {
            color: var(--color-text-muted);
            opacity: 0.92;
        }

        .light-mode #chat-input::placeholder {
            color: #94a3b8;
            opacity: 1;
        }

        .chat-button {
            position: absolute;
            right: 0.45rem;
            top: 50%;
            transform: translate3d(0, -50%, 0);
            border: none;
            border-radius: 50%;
            color: var(--color-background);
            cursor: pointer;
            font-size: var(--font-size-normal);
            height: 2.25rem;
            width: 2.25rem;
            display: -webkit-flex;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            flex-grow: 0;
            min-width: 2.25rem;
            padding: 0;
            line-height: 0;
            z-index: 2;
            -webkit-transition: all var(--transition-speed), transform 0.1s ease-in-out;
            transition: all var(--transition-speed), transform 0.1s ease-in-out;
        }

        #send-button {
            background-color: #00c340;
            color: #fff;
            box-shadow: none;
        }

        #send-button.send-queue {
            background-color: #e67e22;
        }

        #send-button.stop-agent {
            background-color: #d64545;
        }

        #send-button:hover {
            -webkit-transform: translate3d(0, -50%, 0) scale(1.05);
            transform: translate3d(0, -50%, 0) scale(1.05);
            transform-origin: center;
            background-color: #00a936;
            box-shadow: none;
        }

        #send-button.send-queue:hover {
            background-color: #d35400;
        }

        #send-button.stop-agent:hover {
            background-color: #b93333;
        }

        #send-button:active {
            -webkit-transform: translate3d(0, -50%, 0) scale(0.98);
            transform: translate3d(0, -50%, 0) scale(0.98);
            background-color: #008d2e;
        }

        #send-button.stop-agent:active {
            background-color: #9b2727;
        }

        .chat-button svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        #send-button .material-symbols-outlined {
            font-size: 1.35rem;
            font-variation-settings: "wght" 700;
        }

        /* Responsive tweaks */
        @media (max-width: 640px) {
            #chat-input {
                min-height: 4.1rem;
                padding-left: 2.85rem;
                padding-right: 3.55rem;
            }
        }
    </style>
</body>

</html>
