<html>

<head>
    <script type="module">
        import { store as attachmentsStore } from "/components/chat/attachments/attachmentsStore.js";
        import { store as fullScreenStore } from "/components/modals/full-screen-input/full-screen-store.js";
        import { store as messageQueueStore } from "/components/chat/message-queue/message-queue-store.js";
        import { store as chatInputStore } from "/components/chat/input/input-store.js";
    </script>
</head>

<body>
    <div class="input-row">
        <!-- Attachment icon with tooltip -->
        <div class="attachment-wrapper">
            <label for="file-input" class="attachment-icon" title="Add attachments to the message"
                data-bs-placement="top" data-bs-trigger="hover">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z" />
                </svg>
            </label>
            <input type="file" id="file-input" accept="*" multiple style="display: none"
                @change="$store.chatAttachments.handleFileUpload($event)">
        </div>

        <!-- Container for textarea and expand button -->
        <div id="chat-input-container" style="position: relative;">
            <textarea id="chat-input" :placeholder="$store.chatInput.inputPlaceholder" rows="1"
                @keydown.enter="if (!$event.shiftKey && !$event.isComposing && $event.keyCode !== 229) { $event.preventDefault(); $store.chatInput.sendMessage(); }"
                @input="$store.chatInput.adjustTextareaHeight()" x-model="$store.chatInput.message"></textarea>
            <button id="expand-button" @click="$store.fullScreenInputModal.openModal()" aria-label="Expand input">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                </svg>
            </button>
        </div>

        <div id="chat-buttons-wrapper">
            <!-- Send button -->
            <button class="chat-button" id="send-button" :aria-label="$store.chatInput.sendButtonTitle"
                @click="$store.chatInput.sendMessage()" :class="$store.chatInput.sendButtonClass"
                :title="$store.chatInput.sendButtonTitle">
                <span class="material-symbols-outlined" x-text="$store.chatInput.sendButtonIcon"></span>
            </button>
        </div>
    </div>

    <!-- Full Screen Input Modal -->
    <x-component path="modals/full-screen-input/full-screen-input.html"></x-component>


    <style>
        /* Layout rows */
        .input-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            width: 100%;
            white-space: nowrap;
            background: color-mix(in srgb, var(--color-input) 88%, transparent);
            border: 1px solid color-mix(in srgb, var(--color-border) 75%, transparent);
            border-radius: 9999px;
            /* Pill shape */
            padding: 6px 12px 6px 10px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Attachments icon + tooltip */
        .attachment-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .attachment-icon {
            cursor: pointer;
            color: var(--color-text);
            opacity: 0.78;
            transition: opacity 0.2s ease, transform 0.2s ease;
            display: flex;
            align-items: center;
            padding: 6px;
            border-radius: 999px;
        }

        .attachment-icon:hover {
            opacity: 1;
            transform: translateY(-1px);
            background: color-mix(in srgb, var(--color-background-hover) 70%, transparent);
        }

        .attachment-icon:active {
            opacity: 0.5;
        }

        /* Text input */
        #chat-input-container {
            position: relative;
            width: 100%;
        }

        #chat-input {
            background-color: transparent;
            border: none;
            color: var(--color-text);
            flex-grow: 1;
            font-family: "Roboto Mono", monospace;
            font-optical-sizing: auto;
            -webkit-font-optical-sizing: auto;
            font-size: 0.92rem;
            max-height: 7rem;
            min-height: 2.8rem;
            width: 100%;
            padding: 0.62rem 38px 0.62rem 0.45rem;
            margin-right: 0;
            overflow-y: auto;
            scroll-behavior: smooth;
            resize: none;
            align-content: start;
            background-clip: padding-box;
            outline: none;
            transition: all 0.3s ease;
            -webkit-transition: all 0.3s ease;
        }

        #chat-input::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        #chat-input::-webkit-scrollbar-track {
            background: transparent;
            margin: 4px 0;
            border-radius: 6px;
        }

        #chat-input::-webkit-scrollbar-thumb {
            background-color: rgba(155, 155, 155, 0.5);
            border-radius: 6px;
            -webkit-transition: background-color 0.2s ease;
            transition: background-color 0.2s ease;
        }

        #chat-input::-webkit-scrollbar-thumb:hover {
            background-color: rgba(155, 155, 155, 0.7);
        }

        #chat-input:focus {
            outline: none;
            background-color: transparent;
        }

        #chat-input::placeholder {
            color: var(--color-text-muted);
            opacity: 0.66;
        }

        #expand-button {
            position: absolute;
            top: 9px;
            right: 5px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--color-text);
            opacity: 0.48;
            transition: opacity 0.2s, transform 0.2s;
            border-radius: 999px;
            padding: 4px;
        }

        #expand-button:hover {
            opacity: 0.78;
            transform: translateY(-1px);
            background: color-mix(in srgb, var(--color-background-hover) 70%, transparent);
        }

        #expand-button:active {
            opacity: 1;
        }

        #expand-button svg {
            width: 1.3rem;
            height: 1.3rem;
        }

        /* Chat buttons */
        #chat-buttons-wrapper {
            gap: var(--spacing-xs);
            padding-left: 4px;
            line-height: 0.5rem;
            display: -webkit-flex;
            display: flex;
        }

        .chat-button {
            border: none;
            border-radius: 50%;
            color: var(--color-background);
            cursor: pointer;
            font-size: var(--font-size-normal);
            height: 2.35rem;
            width: 2.35rem;
            margin: 0 0.1rem 0 0;
            display: -webkit-flex;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            flex-grow: 0;
            min-width: 2.35rem;
            -webkit-transition: all var(--transition-speed), transform 0.1s ease-in-out;
            transition: all var(--transition-speed), transform 0.1s ease-in-out;
        }

        #send-button {
            background-color: var(--color-primary);
            box-shadow: 0 8px 18px color-mix(in srgb, var(--color-primary) 34%, transparent);
            color: #000;
            /* Dark icon for contrast on neon background */
        }

        .light-mode #send-button {
            color: #fff;
        }

        #send-button.send-queue {
            background-color: #e67e22;
            color: #fff;
        }

        #send-button.stop-agent {
            background-color: #ef4444;
            color: #fff;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
        }

        #send-button:hover {
            -webkit-transform: scale(1.05);
            transform: scale(1.05);
            transform-origin: center;
            filter: brightness(1.1);
        }

        #send-button.send-queue:hover {
            filter: brightness(1.1);
        }

        #send-button.stop-agent:hover {
            filter: brightness(1.1);
        }

        #send-button:active {
            -webkit-transform: scale(0.95);
            transform: scale(0.95);
            transform-origin: center;
            filter: brightness(0.9);
        }

        #send-button.stop-agent:active {
            background-color: #9b2727;
        }

        .chat-button svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        #send-button .material-symbols-outlined {
            font-size: 1.35rem;
        }

        /* Responsive tweaks */
        @media (max-width: 640px) {
            #chat-input {
                min-height: 5.3rem;
                align-content: start;
            }

            #chat-buttons-wrapper {
                display: flex;
                gap: var(--spacing-xs);
                padding: 0 0 0 var(--spacing-sm) !important;
                width: 3.5rem;
                flex-wrap: wrap;
                -webkit-transition: all 0.3s ease;
                transition: all 0.3s ease;
            }
        }

        @media (min-width: 768px) {
            #chat-buttons-wrapper {
                flex-wrap: nowrap;
                -webkit-flex-wrap: nowrap;
                flex-wrap: nowrap;
            }
        }
    </style>
</body>

</html>
