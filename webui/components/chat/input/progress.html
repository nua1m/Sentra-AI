<html>

<head>
</head>

<body>
  <div id="progress-bar-box">
    <h4 id="progress-bar-h">
      <span id="progress-bar-i">|></span><span id="progress-bar"></span>
    </h4>
  </div>


  <style>
    #progress-bar-box {
      background: transparent;
      padding-top: 0;
      padding-bottom: 0;
      padding-left: var(--spacing-sm);
      padding-right: var(--spacing-md);
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      z-index: 1001;
      gap: var(--spacing-sm);
    }

    @media (min-width: 1025px) {
      #progress-bar-box {
        padding-left: max(var(--spacing-sm), calc((100% - var(--chat-max-width, 55em)) / 2));
        padding-right: max(var(--spacing-sm), calc((100% - var(--chat-max-width, 55em)) / 2));
      }
    }

    #progress-bar-box h4 {
      margin: 0;
      width: 100%;
    }

    #progress-bar-h {
      color: color-mix(in srgb, var(--color-primary) 70%, var(--color-text));
      display: flex;
      align-items: left;
      justify-content: flex-start;
      min-height: 1.6em;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
      font-size: 0.78rem;
      font-weight: 500;
      background: color-mix(in srgb, var(--color-input) 84%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
      border-radius: 999px;
      padding: 5px 10px;
    }

    #progress-bar-i {
      font-weight: bold;
      padding-right: 0.42em;
      color: color-mix(in srgb, var(--color-primary) 60%, var(--color-text-muted));
    }

    .shiny-text {
      background: linear-gradient(to right, var(--color-primary-dark) 20%, var(--color-text) 40%, var(--color-text) 60%, var(--color-primary-dark) 60%);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 1s linear infinite;
    }

    @keyframes shine {
      to {
        background-position: -200% center;
      }
    }

    .light-mode #progress-bar-i {
      color: var(--color-border-dark);
      opacity: 0.5;
    }
  </style>
</body>

</html>
