<html>

<head>
</head>

<body>
  <div id="progress-bar-box">
    <h4 id="progress-bar-h">
      <span id="progress-bar-i">|></span><span id="progress-bar"></span>
    </h4>
  </div>


  <style>
    #progress-bar-box {
      background-color: var(--color-panel);
      padding-top: var(--spacing-sm);
      padding-bottom: 0;
      padding-left: var(--spacing-sm);
      padding-right: var(--spacing-md);
      padding-bottom: 0;
      display: flex;
      justify-content: space-between;
      z-index: 1001;
      gap: var(--spacing-sm);
    }

    @media (min-width: 1025px) {
      #progress-bar-box {
        padding-left: max(var(--spacing-sm), calc((100% - var(--chat-max-width, 55em)) / 2));
        padding-right: max(var(--spacing-sm), calc((100% - var(--chat-max-width, 55em)) / 2));
      }
    }

    #progress-bar-box h4 {
      margin: 0 1.2em 0 0;
    }

    #progress-bar-h {
      color: var(--color-primary);
      display: flex;
      align-items: left;
      justify-content: flex-start;
      height: 1.2em;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
      font-weight: normal;
    }

    #progress-bar-i {
      font-weight: bold;
      padding-right: 0.5em;
      color: var(--color-secondary);
    }

    .shiny-text {
      background: linear-gradient(to right, var(--color-primary-dark) 20%, var(--color-text) 40%, var(--color-text) 60%, var(--color-primary-dark) 60%);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 1s linear infinite;
    }

    @keyframes shine {
      to {
        background-position: -200% center;
      }
    }

    .light-mode #progress-bar-i {
      color: var(--color-border-dark);
      opacity: 0.5;
    }
  </style>
</body>

</html>
