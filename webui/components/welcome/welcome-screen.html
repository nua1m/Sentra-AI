<html>

<head>
    <script type="module">
        import { store } from "/components/welcome/welcome-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.welcomeStore && $store.welcomeStore.isVisible">
            <div x-create="$store.welcomeStore.onCreate()" class="welcome-container">
                <div class="welcome-content">
                    <div class="welcome-ops-shell">
                        <div class="welcome-ops-header">
                            <span class="material-symbols-outlined">terminal</span>
                            <h2>NEURAL_INTERFACE_QUERY</h2>
                        </div>

                        <div class="welcome-ops-panel">
                            <div class="welcome-ops-center">
                                <div class="welcome-ops-icon">&lt;&gt;</div>
                                <h3>READY FOR INSTRUCTION</h3>
                                <p>Input command or query security matrix. AI core is synchronized with real-time scan
                                    telemetry.</p>
                            </div>

                            <div class="welcome-command-row">
                                <span class="welcome-command-prompt">&gt;_</span>
                                <input type="text" id="welcome-command-input"
                                    placeholder="Run query --scope=production --threat-level=critical"
                                    @keydown.enter="if ($event.target.value?.trim()) { $store.chatInput.message = $event.target.value.trim(); $store.chatInput.sendMessage(); $event.target.value = ''; }" />
                                <button type="button" class="welcome-exec-btn"
                                    @click="const input = document.getElementById('welcome-command-input'); if (input && input.value?.trim()) { $store.chatInput.message = input.value.trim(); $store.chatInput.sendMessage(); input.value=''; }">
                                    EXECUTE
                                </button>
                            </div>

                            <div class="welcome-quick-cmds">
                                <button type="button" class="welcome-quick-btn"
                                    @click="$store.chatInput.message='List critical findings for current target'; $store.chatInput.sendMessage()">[
                                    LIST_CRITICAL ]</button>
                                <button type="button" class="welcome-quick-btn"
                                    @click="$store.chatInput.message='Summarize network exposure and high-risk ports'; $store.chatInput.sendMessage()">[
                                    SUMMARIZE_NETWORK ]</button>
                                <button type="button" class="welcome-quick-btn"
                                    @click="$store.chatInput.message='Run full attack surface audit with CVE enrichment'; $store.chatInput.sendMessage()">[
                                    AUDIT_ATTACK_SURFACE ]</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </template>
    </div>

    <style>
        /* Welcome Screen Styles */
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3%;
            text-align: center;
            background: var(--color-background);
            color: var(--color-text);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .welcome-container::before {
            content: none;
        }

        .welcome-content {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Welcome container styles */
        .welcome-logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-logo {
            width: 7rem;
            height: 7rem;
        }

        /* Themes adjustments for logo */
        .light-mode .welcome-logo {
            filter: invert(0.5);
        }

        .dark-mode .welcome-logo {
            filter: invert(0.8);
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 400;
            margin: var(--spacing-xs) 0 0 0;
            color: var(--color-text);
        }

        .welcome-action-title {
            margin-bottom: 0;
        }

        .welcome-subtitle {
            font-size: 1rem;
            margin-bottom: 2rem;
            color: var(--color-secondary);
            max-width: 600px;
            line-height: 1.5;
        }

        .welcome-ops-shell {
            width: 100%;
            max-width: 980px;
            margin: 1.5rem 0;
            border: 1px solid var(--color-border);
            background: color-mix(in srgb, var(--color-panel) 92%, #000 8%);
            padding: 1.4rem;
            border-radius: 8px;
            text-align: left;
        }

        .welcome-ops-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: var(--color-primary);
        }

        .welcome-ops-header h2 {
            margin: 0;
            font-size: 1.35rem;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        .welcome-ops-panel {
            border: 1px solid var(--color-border);
            background: color-mix(in srgb, var(--color-panel) 94%, #000 6%);
            padding: 1.2rem;
        }

        .welcome-ops-center {
            text-align: center;
            padding: 2.4rem 0 1.2rem;
        }

        .welcome-ops-icon {
            font-size: 2.2rem;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .welcome-ops-center h3 {
            margin: 0.2rem 0 0.75rem;
            letter-spacing: 0.08em;
            font-size: 1.2rem;
        }

        .welcome-ops-center p {
            margin: 0 auto;
            max-width: 680px;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        .welcome-command-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 0.75rem;
            align-items: center;
            margin-top: 1.2rem;
            border: 1px solid var(--color-border);
            padding: 0.6rem;
        }

        .welcome-command-prompt {
            color: var(--color-primary);
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 0 0.4rem;
        }

        #welcome-command-input {
            border: none;
            background: transparent;
            color: var(--color-text);
            outline: none;
            font-family: "Roboto Mono", monospace;
        }

        .welcome-exec-btn {
            border: 1px solid var(--color-primary);
            background: var(--color-primary);
            color: #000;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

        .welcome-quick-cmds {
            margin-top: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .welcome-quick-btn {
            border: 1px solid var(--color-border);
            background: transparent;
            color: var(--color-text-secondary);
            font-family: "Roboto Mono", monospace;
            font-size: 0.78rem;
            padding: 0.35rem 0.55rem;
            cursor: pointer;
        }

        .welcome-quick-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-text);
        }

        .welcome-actions-footer {
            max-width: 640px;
            width: 100%;
            display: flex;
            justify-content: flex-start;
            gap: 0.5rem;
            margin-top: -0.75rem;
        }

        .welcome-refresh-button {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: 10px;
            color: var(--color-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .welcome-refresh-button:hover {
            border-color: var(--color-primary);
            background: var(--color-message-bg);
            color: var(--color-text);
        }

        .welcome-refresh-button:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .welcome-refresh-button .material-symbols-outlined {
            font-size: 1.25rem;
        }

        .welcome-spin {
            animation: welcome-spin 0.9s linear infinite;
        }

        @keyframes welcome-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .welcome-action-card {
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 0.6rem;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
        }

        .welcome-action-card:hover {
            border-color: var(--color-primary);
            background: var(--color-message-bg);
        }

        .welcome-action-icon {
            font-size: 2.1rem;
            margin-bottom: 0.25rem;
            color: var(--color-highlight-dark);
        }

        .welcome-action-title {
            font-size: 0.9rem;
        }

        /* Banner Styles */
        .welcome-banners {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 680px;
            width: 100%;
            margin-top: 1.5rem;
        }

        .welcome-banner {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            text-align: left;
            position: relative;
            transition: all 0.2s ease;
        }

        .welcome-banner:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        /* Banner Type Styles */
        .welcome-banner.banner-info,
        .welcome-banner.banner-warning,
        .welcome-banner.banner-error {
            border-left: none;
        }

        /* Banner Icon */
        .welcome-banner-icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-top: 2px;
        }

        .welcome-banner-icon .material-symbols-outlined {
            font-size: 1.25rem;
        }

        .banner-info .welcome-banner-icon {
            color: #2196F3;
        }

        .banner-warning .welcome-banner-icon {
            color: #FF9800;
        }

        .banner-error .welcome-banner-icon {
            color: #F44336;
        }

        /* Banner Content */
        .welcome-banner-content {
            flex: 1;
            min-width: 0;
        }

        .welcome-banner-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-text);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .welcome-banner-html {
            font-size: 0.85rem;
            color: var(--color-secondary);
            line-height: 1.5;
        }

        .welcome-banner-html a {
            color: var(--color-primary);
            text-decoration: underline;
            cursor: pointer;
        }

        .welcome-banner-html a:hover {
            color: var(--color-highlight-dark);
        }

        .welcome-banner-html strong {
            color: var(--color-text);
            font-weight: 600;
        }

        /* Banner Dismiss Button */
        .welcome-banner-dismiss {
            flex-shrink: 0;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--color-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            opacity: 0.6;
        }

        .welcome-banner-dismiss:hover {
            background: var(--color-border);
            color: var(--color-text);
            opacity: 1;
        }

        .welcome-banner-dismiss .material-symbols-outlined {
            font-size: 1.1rem;
        }

        /* Light mode adjustments */
        .light-mode .welcome-title {
            color: #2d2d2d;
        }

        .light-mode .welcome-subtitle {
            color: #666;
        }

        .light-mode .welcome-action-title {
            color: #2d2d2d;
        }

        .light-mode .welcome-action-description {
            color: #666;
        }

        .light-mode .welcome-footer {
            color: #666;
        }

        .light-mode .welcome-banner {
            background: var(--color-panel);
        }

        .light-mode .welcome-banner-title {
            color: var(--color-text);
        }

        .light-mode .welcome-banner-html {
            color: var(--color-primary);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .welcome-container {
                padding: 1rem;
                padding-top: 3rem;
            }

            .welcome-logo {
                width: 5rem;
                height: 5rem;
            }

            .welcome-logo-container {
                margin-top: 2rem;
            }

            .welcome-title {
                font-size: 1.5rem;
                margin: 0 !important;
            }

            .welcome-subtitle {
                font-size: 1rem;
                margin-top: var(--spacing-xs);
                margin-bottom: 0;
            }

            .welcome-ops-shell {
                margin: 0.8rem 0 1.5rem;
                padding: 1rem;
            }

            .welcome-command-row {
                grid-template-columns: 1fr;
                gap: 0.55rem;
            }

            .welcome-command-prompt {
                display: none;
            }

            .welcome-exec-btn {
                width: 100%;
            }

            .welcome-banners {
                max-width: 100%;
            }

            .welcome-banner {
                padding: 12px 14px;
            }

            .welcome-banner-title {
                font-size: 0.85rem;
            }

            .welcome-banner-html {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 520px) {
            .welcome-quick-btn {
                width: 100%;
                text-align: left;
            }
        }
    </style>
</body>

</html>
