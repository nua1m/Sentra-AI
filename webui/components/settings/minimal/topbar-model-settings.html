<html>

<head>
    <title>Settings</title>
    <script type="module">
        import { store as settingsStore } from "/components/settings/settings-store.js";
    </script>
</head>

<body>
    <div x-data="{ apiKey: '', modelName: '', loading: false, loaded: false, activeTab: 'model' }" x-init="(async () => {
      try {
        await $store.settings.onOpen();
        const settings = $store.settings.settings || {};
        apiKey = settings.api_keys?.openrouter || '';
        modelName = settings.chat_model_name || '';
      } catch (e) {
        console.warn('Failed to preload minimal settings', e);
      } finally {
        loaded = true;
      }
    })()">

        <div class="minimal-settings">
            <h3 x-text="activeTab === 'model' ? 'Model Settings' : (activeTab === 'files' ? 'Files' : 'Scheduler')">
            </h3>
            <p class="desc" x-text="activeTab === 'model'
                ? 'Enter OpenRouter API key and model. Sentra will apply these to Chat, Utility, and Browser models automatically.'
                : (activeTab === 'files'
                    ? 'Open the Sentra file browser to manage workspace files.'
                    : 'Open scheduler to create recurring or planned tasks.')"></p>

            <div class="tabs" role="tablist" aria-label="Minimal settings tabs">
                <button type="button" class="tab-btn" :class="{ 'active': activeTab === 'model' }"
                    @click="activeTab = 'model'">Model</button>
                <button type="button" class="tab-btn" :class="{ 'active': activeTab === 'files' }"
                    @click="activeTab = 'files'; $store.chatInput.browseFiles(); closeModal('settings/minimal/topbar-model-settings.html')">Files</button>
                <button type="button" class="tab-btn" :class="{ 'active': activeTab === 'scheduler' }"
                    @click="activeTab = 'scheduler'; openModal('modals/scheduler/scheduler-modal.html'); closeModal('settings/minimal/topbar-model-settings.html')">Scheduler</button>
            </div>

            <div x-show="activeTab === 'model'" x-transition>
                <div class="field">
                    <label>OpenRouter API key</label>
                    <input type="password" x-model="apiKey" autocomplete="off" placeholder="sk-or-..." />
                </div>

                <div class="field">
                    <label>Model</label>
                    <input type="text" x-model="modelName" placeholder="openai/gpt-4.1" />
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-cancel minimal-cancel"
                    @click="closeModal('settings/minimal/topbar-model-settings.html')">Cancel</button>
                <button class="btn btn-ok minimal-save" :disabled="loading"
                    @click="(async () => { loading = true; const ok = await $store.settings.saveMinimalModelSettings(apiKey, modelName); loading = false; if (ok) closeModal('settings/minimal/topbar-model-settings.html'); })()">
                    <span x-show="!loading">Save Changes</span>
                    <span x-show="loading">Saving...</span>
                </button>
            </div>
        </div>
    </div>

    <style>
        .minimal-settings {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            min-width: 0;
            max-width: 100%;
            box-sizing: border-box;
            margin: 0;
            padding: 8px 2px 0;
        }

        .minimal-settings h3 {
            margin: 0;
            font-size: 1.05rem;
            text-align: left;
            color: var(--color-text);
        }

        .minimal-settings .desc {
            margin: 0;
            color: var(--color-text-secondary);
            font-size: 0.98rem;
            line-height: 1.55;
        }

        .minimal-settings .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            align-items: flex-start;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            width: 100%;
        }

        .tab-btn {
            border: 1px solid var(--color-border);
            border-radius: 10px;
            background: var(--color-panel);
            color: var(--color-text-secondary);
            padding: 9px 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .tab-btn.active {
            color: var(--color-text);
            border-color: var(--color-primary);
            box-shadow: 0 0 0 1px var(--color-primary);
        }

        .minimal-settings input {
            border: 1px solid var(--color-border);
            background: var(--color-background);
            color: var(--color-text);
            border-radius: 10px;
            width: 100%;
            padding: 11px 14px;
            font-size: 0.98rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.15s ease;
        }

        .minimal-settings input:focus {
            border-color: var(--color-primary);
        }

        .minimal-settings label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            text-align: left;
            width: 100%;
        }

        @media (max-width: 700px) {
            .minimal-settings {
                width: 100%;
                max-width: 100%;
            }

        }

        .modal-inner {
            width: min(92vw, 700px);
            max-width: 700px;
            border-radius: 16px;
        }

        .modal-scroll {
            padding: 0 1.8rem 1.8rem 1.8rem;
        }

        .modal-header {
            padding: 1rem 1.8rem;
        }

        .modal-header h2 {
            text-align: left;
        }

        .minimal-settings .actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
        }

        .minimal-cancel {
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            padding: 8px 12px;
        }

        .minimal-cancel:hover {
            color: var(--color-text);
            background: transparent;
        }

        .minimal-save {
            min-width: 150px;
            border-radius: 10px;
            font-weight: 700;
        }

        .minimal-settings .actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 4px;
        }
    </style>
</body>

</html>
